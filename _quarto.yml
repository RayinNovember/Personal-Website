project:
  type: website

website:
  title: "Ray Wang"
  site-url: https://changruiraywang.com
  description: "Personal portfolio of Ray Wang — Data Scientist at Wallick Communities."
  # favicon: assets/ray/img/logo.svg
  page-navigation: true
  back-to-top-navigation: true
  comments: false

  navbar:
    # logo: assets/ray/img/logo.svg
    tools:
    - icon: github
      href: https://github.com/   # TODO: replace with your GitHub URL
    right:
      - text: About
        aria-label: "About Me"
        href: about/index.qmd
      - text: Blog
        aria-label: "Blog"
        href: blog/index.qmd
      - text: Projects
        aria-label: "Project Portfolio"
        href: project/index.qmd

  page-footer:
    left: >-
     &#169; 2026 Ray Wang &#8729; Made with [Quarto](https://quarto.org)
    center: |
      <a class="link-dark me-1" href="/accessibility.html" title="Accessibility commitment" target="_blank" rel="noopener">{{< fa universal-access >}}</a>
      <a class="link-dark me-1" href="https://linkedin.com/in/" title="LinkedIn" target="_blank" rel="noopener">{{< fa brands linkedin >}}</a>
      <a class="link-dark me-1" href="https://github.com/" title="GitHub" target="_blank" rel="noopener">{{< fa brands github >}}</a>
      <a class="link-dark me-1" href="mailto:you@example.com" title="Email" target="_blank" rel="noopener">{{< fa envelope >}}</a>

    right:
      - text: "Accessibility"
        aria-label: "Accessibility Commitment"
        href: accessibility.qmd
      - text: "Contact"
        aria-label: "Contact Form"
        href: "contact.qmd"
      - text: "License"
        aria-label: "License Details"
        href: license.qmd
      - icon: rss
        href: blog/index.xml

format:
  html:
    theme:
      light:
        - cosmo
        - assets/theme-light.scss
      dark:
        - cosmo
        - assets/theme-dark.scss
    code-link: true
    pagetitle: "{{< meta title >}}"
    lightbox: true

execute:
  freeze: auto
